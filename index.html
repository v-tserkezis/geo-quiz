// ─── NORMALIZE for open-ended comparison ─────────────────────────────
function normalizeAnswer(str) {
  return String(str)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "") // αφαίρεση τόνων
    .toLowerCase()
    .replace(/[.,!?;:'"()\-]/g, "") // αφαίρεση στίξης
    .replace(/\s+/g, " ")
    .trim();
}

function checkOpenAnswer(given, correct) {
  const g = normalizeAnswer(given);
  const c = normalizeAnswer(correct);
  if (g === c) return true;
  // Also accept if given contains the correct answer or vice versa (for compound answers)
  if (g.includes(c) || c.includes(g)) return g.length >= Math.max(2, c.length - 2);
  return false;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
      body: JSON.stringify({ model: "claude-haiku-4-5-20251001", max_tokens: 2048, messages: [{ role: "user", content: prompt }] }),
    }),
    parseResponse: (data) => {
      const text = data.content?.[0]?.text || "";
      return JSON.parse(text.match(/\[[\s\S]*\]/)?.[0] || "[]");
    },
  },
  openai: {
    name: "OpenAI (ChatGPT)",
    model: "gpt-4o-mini",
    url: "https://api.openai.com/v1/chat/completions",
    makeRequest: (apiKey, prompt) => ({
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
      body: JSON.stringify({ model: "gpt-4o-mini", max_tokens: 2048, messages: [{ role: "user", content: prompt }] }),
    }),
    parseResponse: (data) => {
      const text = data.choices?.[0]?.message?.content || "";
      return JSON.parse(text.match(/\[[\s\S]*\]/)?.[0] || "[]");
    },
  },
  google: {
    name: "Google (Gemini)",
    model: "gemini-2.0-flash-lite",
    url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent",
    makeRequest: (apiKey, prompt) => ({
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      urlSuffix: "?key=" + apiKey,
    }),
    parseResponse: (data) => {
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      return JSON.parse(text.match(/\[[\s\S]*\]/)?.[0] || "[]");
    },
  },
};

async function fetchAIQuestions(provider, apiKey, categoryLabel, count, langCode) {
  const prov = AI_PROVIDERS[provider];
  if (!prov || !apiKey) return null;
  const langName = langCode === "el" ? "Greek" : "English";
  const half = Math.floor(count / 2);
  const prompt = `Generate exactly ${count} geography quiz questions about "${categoryLabel}" for elementary school children. Language: ${langName}.
IMPORTANT: Generate EXACTLY ${half} single-choice questions AND EXACTLY ${half} multiple-choice questions (with 2+ correct answers). Alternate between types.
Return ONLY a valid JSON array, no markdown, no explanation.

Single choice format (EXACTLY ${half} of these):
{"type":"single","q":"question text","a":"the one correct answer","o":["wrong1","wrong2","wrong3"]}

Multiple choice format (EXACTLY ${half} of these):
{"type":"multi","q":"question text — which ones are correct?","a":["correct1","correct2"],"o":["wrong1","wrong2"],"allOpts":["correct1","wrong1","correct2","wrong2"]}

Rules: All text in ${langName}. Questions must be factually correct. Multi questions must have exactly 2 correct answers and 2 wrong answers.`;
  try {
    const reqOpts = prov.makeRequest(apiKey, prompt);
    const url = prov.url + (reqOpts.urlSuffix || "");
    delete reqOpts.urlSuffix;
    const res = await fetch(url, reqOpts);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const raw = prov.parseResponse(data);
    if (!Array.isArray(raw) || raw.length === 0) throw new Error("Empty response");
    // Normalize each question
    const questions = raw.map(q => {
      if (!q.q || !q.a) return null;
      // If type is multi but a is a string like "Athens, Rome" → convert to array
      if (q.type === "multi" && typeof q.a === "string" && q.a.includes(",")) {
        q.a = q.a.split(",").map(s => s.trim()).filter(Boolean);
      }
      // If a is array → must be multi
      if (Array.isArray(q.a)) {
        q.type = "multi";
        if (!q.allOpts) q.allOpts = [...q.a, ...(q.o || [])];
      }
      // Default to single
      if (!q.type) q.type = "single";
      return q;
    }).filter(q => {
      if (!q || !q.q || !q.a) return false;
      if (q.type === "multi") return Array.isArray(q.a) && q.a.length >= 2;
      return typeof q.a === "string" && Array.isArray(q.o) && q.o.length >= 2;
    });
    if (questions.length === 0) throw new Error("No valid questions");
    return questions;
  } catch (e) {
    console.error("AI fetch error:", e);
    return null;
  }
}

      mq.addEventListener("change", handler);
      return () => mq.removeEventListener("change", handler);
    }
    setIsDark(themeMode === "dark");
  }, [themeMode]);

  // Load progress
  useEffect(() => {
    try {
      const saved = localStorage.getItem("geo-quiz-progress");

      const savedLang = localStorage.getItem("geo-quiz-lang");

      const savedAiMode = localStorage.getItem("geo-quiz-ai-mode");
      if (savedAiProv) setAiProvider(savedAiProv);
      try {
        const allKeys = JSON.parse(localStorage.getItem("geo-quiz-ai-keys") || "{}");
        const prov = savedAiProv || "anthropic";

          setAiKeyInput(allKeys[prov]);
          setAiStatus("ok");
          if (savedAiMode !== "off") setAiMode(true);
        }
      } catch {}

          if (type === "multi") {

          return { ...q, type: "single", options: shuffle([q.a, ...(q.o || []).slice(0, 3)]) };

        setQuestions(prepared);
        setQIdx(0);
        setScore(0);
        setSelectedAns(null);
        setAnswered(false);
        setSelectedMulti([]);
        setOpenAnswer("");
        return;
      }

    const data = DATA[lang][cat.region][cat.sub].questions;

      const options = shuffle([q.a, ...q.o]);
      return { ...q, type: q.type || "single", options };

    setQuestions(prepared);
    setQIdx(0);
    setScore(0);
    setSelectedAns(null);
    setAnswered(false);
    setSelectedMulti([]);
    setOpenAnswer("");
    setScreen("quiz");

    const q = questions[qIdx];
    if (q.type === "multi") {
      setSelectedMulti(prev => prev.includes(ans) ? prev.filter(x => x !== ans) : [...prev, ans]);
      return;
    }
    if (q.type === "open") return;
    // Single choice
    setSelectedAns(ans);
    setAnswered(true);
    if (ans === q.a) setScore((s) => s + 1);
  };

  const submitMulti = () => {
    if (answered) return;
    const q = questions[qIdx];
    const correct = Array.isArray(q.a) ? q.a : [q.a];
    const isCorrect = correct.length === selectedMulti.length && correct.every(a => selectedMulti.includes(a));
    setAnswered(true);
    if (isCorrect) setScore((s) => s + 1);
  };

  const submitOpen = () => {

    if (isRight) setScore((s) => s + 1);
  };

  const nextQuestion = () => {

          plays: prev.plays + 1,

      saveProgress(newP);

                  ? ((totalStars - LEVEL_THRESHOLDS[levelIdx]) / (LEVEL_THRESHOLDS[levelIdx + 1] - LEVEL_THRESHOLDS[levelIdx])) * 100
                  : 100
              )} />
            </div>
          </div>
        </div>

        <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 16, opacity: 0.7, textAlign: "center" }}>
          {lang === "el" ? "Επίλεξε περιοχή" : "Choose a region"}
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {regions.map((r) => {
            const cats = CATEGORIES.filter((c) => c.region === r.key);
            const regionStars = cats.reduce((sum, cat) => {
              const p = progress[`${cat.region}-${cat.sub}`];
              return sum + (p ? p.stars : 0);
            }, 0);
            const maxStars = cats.length * 3;
            return (
              <div
                key={r.key}
                style={{
                  background: cardBg,
                  borderRadius: 20,
                  padding: "22px 24px",
                  cursor: "pointer",
                  border: `2px solid ${isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"}`,
                  transition: "all 0.25s",
                  display: "flex",
                  alignItems: "center",
                  gap: 16,
                  boxShadow: isDark ? "0 4px 20px rgba(0,0,0,0.3)" : "0 2px 12px rgba(0,0,0,0.06)",
                }}
                onClick={() => { setSelectedRegion(r.key); setScreen("subcategory"); }}
                onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-3px) scale(1.01)"; e.currentTarget.style.boxShadow = `0 8px 28px ${accentColor}33`; e.currentTarget.style.borderColor = accentColor; }}
                onMouseLeave={(e) => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; e.currentTarget.style.borderColor = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"; }}
              >
                <div style={{ lineHeight: 1 }}><MI name={r.icon} size={42} color={accentColor} /></div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 20, fontWeight: 800, color: accentColor }}>{t[r.key]}</div>
                  <div style={{ fontSize: 12, opacity: 0.6, marginTop: 2 }}>
                    {cats.length} {lang === "el" ? "κατηγορίες" : "categories"}
                  </div>
                  <div style={{ ...styles.progressBar, marginTop: 8, height: 5 }}>
                    <div style={styles.progressFill(maxStars > 0 ? (regionStars / maxStars) * 100 : 0)} />
                  </div>
                  <div style={{ fontSize: 11, opacity: 0.5, marginTop: 3, display: "flex", alignItems: "center", gap: 3 }}><MI name="star" size={13} color={skin.star} /> {regionStars}/{maxStars}</div>
                </div>
                <div><MI name="chevron_right" size={24} style={{ opacity: 0.4 }} /></div>
              </div>
            );
          })}
        </div>

        {/* Teacher Questions section */}
        {teacherQuestions.length > 0 && (
          <div style={{ marginTop: 24 }}>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 12, opacity: 0.7, textAlign: "center" }}>
              {t.teacherQuestions}
            </div>
            <div
              style={{
                background: cardBg,
                borderRadius: 20,
                padding: "22px 24px",
                cursor: "pointer",
                border: `2px solid ${isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"}`,
                transition: "all 0.25s",
                display: "flex",
                alignItems: "center",
                gap: 16,
                boxShadow: isDark ? "0 4px 20px rgba(0,0,0,0.3)" : "0 2px 12px rgba(0,0,0,0.06)",
              }}
              onClick={() => {
                const shuffled = [...teacherQuestions].sort(() => Math.random() - 0.5).slice(0, Math.min(questionsPerRound, teacherQuestions.length));
                const prepared = shuffled.map((q) => {
                  const type = q.type || "single";
                  if (type === "open") return { ...q, type, options: [] };
                  if (type === "multi") {
                    const allOpts = q.allOpts || [...(Array.isArray(q.a) ? q.a : [q.a]), ...(q.o || [])];
                    return { ...q, type, options: allOpts.sort(() => Math.random() - 0.5) };
                  }
                  return { ...q, type, options: [...(q.o || []), q.a].sort(() => Math.random() - 0.5) };
                });
                setCurrentCat({ region: "teacher", sub: "custom", labelKey: "teacherQuestions" });
                setQuestions(prepared);
                setQIdx(0);
                setScore(0);
                setSelectedAns(null);
                setAnswered(false);
                setSelectedMulti([]);
                setOpenAnswer("");
                setScreen("quiz");
              }}
              onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-3px) scale(1.01)"; e.currentTarget.style.boxShadow = `0 8px 28px ${accentColor}33`; }}
              onMouseLeave={(e) => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}
            >
              <div style={{ lineHeight: 1 }}><MI name="school" size={42} color={accentColor} /></div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 20, fontWeight: 800, color: accentColor }}>{t.teacherQuestions}</div>
                <div style={{ fontSize: 12, opacity: 0.6, marginTop: 2 }}>
                  {teacherQuestions.length} {lang === "el" ? "ερωτήσεις" : "questions"}
                </div>
              </div>
              <div><MI name="play_arrow" size={28} color={accentColor} /></div>
            </div>
          </div>
        )}

      </div>
    );
  };

  // ─── RENDER SUBCATEGORY (after picking a region) ───
  const renderSubcategory = () => {
    if (!selectedRegion) return null;
    const cats = CATEGORIES.filter((c) => c.region === selectedRegion);
    const regionIcons = { greece: "location_city", europe: "euro", world: "public" };
    return (
      <div style={{ width: "100%", maxWidth: 600 }}>
        {/* Region title */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 20 }}>
          <span style={{ fontSize: 26, fontWeight: 800, color: accentColor, display: "flex", alignItems: "center", gap: 8 }}>
            <MI name={regionIcons[selectedRegion]} size={30} /> {t[selectedRegion]}
          </span>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {cats.map((cat) => {
            const key = `${cat.region}-${cat.sub}`;
            const p = progress[key];
            const stars = p ? p.stars : 0;
            const qCount = DATA[lang][cat.region][cat.sub].questions.length;
            return (
              <div
                key={key}
                style={{
                  background: cardBg,
                  borderRadius: 16,
                  padding: "18px 20px",
                  cursor: "pointer",
                  border: `2px solid ${stars >= 3 ? skin.star : isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)"}`,
                  transition: "all 0.2s",
                  display: "flex",
                  alignItems: "center",
                  gap: 14,
                  boxShadow: isDark ? "0 4px 20px rgba(0,0,0,0.3)" : "0 2px 12px rgba(0,0,0,0.06)",
                }}
                onClick={() => startQuiz(cat)}
                onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = `0 6px 24px ${accentColor}33`; }}
                onMouseLeave={(e) => { e.currentTarget.style.transform = ""; e.currentTarget.style.boxShadow = ""; }}
              >
                <MI name={cat.icon} size={30} color={accentColor} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{t[cat.labelKey]}</div>
                  <div style={{ fontSize: 12, opacity: 0.5, marginTop: 2 }}>
                    {qCount} {lang === "el" ? "ερωτήσεις" : "questions"}
                    {p ? ` · Best: ${p.best}` : ""}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 2 }}>
                  {[1, 2, 3].map((i) => (
                    <MI key={i} name="star" size={18} color={skin.star} style={{ opacity: i <= stars ? 1 : 0.15 }} />
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ─── RENDER QUIZ ───
  const renderQuiz = () => {
    if (aiLoading) return (
      <div style={{ ...styles.quizContainer, textAlign: "center", paddingTop: 80 }}>
        <MI name="auto_awesome" size={48} color={accentColor} />
        <div style={{ fontSize: 18, fontWeight: 700, marginTop: 16, color: accentColor }}>{t.aiGenerating}</div>
        <div style={{ marginTop: 12, opacity: 0.6, fontSize: 14 }}>{AI_PROVIDERS[aiProvider]?.name}</div>
      </div>
    );
    if (!questions.length) return null;
    const q = questions[qIdx];
    const qType = q.type || "single";
    const correctArr = Array.isArray(q.a) ? q.a : [q.a];
    const isCorrect = qType === "single" ? selectedAns === q.a
      : qType === "multi" ? (correctArr.length === selectedMulti.length && correctArr.every(a => selectedMulti.includes(a)))
      : checkOpenAnswer(openAnswer, q.a);

    // Multi option style
    const multiOptBtn = (opt) => {
      const isSelected = selectedMulti.includes(opt);
      const isRight = correctArr.includes(opt);
      let bg2 = isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.04)";
      let border = isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.08)";
      let col = textColor;
      if (answered) {
        if (isRight) { bg2 = skin.correct + "22"; border = skin.correct; col = isDark ? "#fff" : skin.correct; }
        else if (isSelected && !isRight) { bg2 = skin.wrong + "22"; border = skin.wrong; col = isDark ? "#fff" : skin.wrong; }
      } else if (isSelected) { bg2 = accentColor + "15"; border = accentColor; }
      return { width: "100%", padding: "14px 18px", borderRadius: 14, border: `2px solid ${border}`, background: bg2, color: col, fontSize: 15, fontWeight: 700, cursor: answered ? "default" : "pointer", textAlign: "left", transition: "all 0.2s", marginBottom: 8, display: "flex", alignItems: "center", gap: 10 };
    };

    return (
      <div style={styles.quizContainer}>
        <div style={styles.quizProgress}>
          <span>{t.question} {qIdx + 1} {t.of} {questions.length}</span>
          <span>{t.score}: {score}/{questions.length}</span>
        </div>
        <div style={{ display: "flex", gap: 4, marginBottom: 16 }}>
          {questions.map((_, i) => (
            <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i < qIdx ? skin.correct : i === qIdx ? accentColor : (isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.08)"), transition: "all 0.3s" }} />
          ))}
        </div>

        <div style={styles.quizCard}>
          {q.imageUrl && (
            <div style={{ marginBottom: 16, borderRadius: 12, overflow: "hidden", border: `2px solid ${isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.06)"}` }}>
              <img src={q.imageUrl} alt="" style={{ width: "100%", maxHeight: 220, objectFit: "cover", display: "block" }} />
            </div>
          )}
          <div style={styles.questionText}>
            {q.q}
            {qType === "multi" && <span style={{ display: "block", fontSize: 13, fontWeight: 600, color: accentColor, marginTop: 4 }}>
              <MI name="check_box" size={14} /> {lang === "el" ? `Επίλεξε ${correctArr.length} σωστές` : `Select ${correctArr.length} correct`}
            </span>}
            {qType === "open" && <span style={{ display: "block", fontSize: 13, fontWeight: 600, color: accentColor, marginTop: 4 }}>
              <MI name="edit_note" size={14} /> {lang === "el" ? "Γράψε την απάντηση" : "Type your answer"}
            </span>}
          </div>

          {/* SINGLE CHOICE */}
          {qType === "single" && q.options && q.options.map((opt, i) => (
            <button key={i} style={styles.optionBtn(opt)} onClick={() => handleAnswer(opt)}>
              <span style={{ width: 28, height: 28, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>
                {String.fromCharCode(65 + i)}
              </span>
              {opt}
            </button>
          ))}

          {/* MULTIPLE CHOICE */}
          {qType === "multi" && q.options && q.options.map((opt, i) => (
            <button key={i} style={multiOptBtn(opt)} onClick={() => handleAnswer(opt)}>
              <span style={{ width: 28, height: 28, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", background: selectedMulti.includes(opt) ? accentColor + "30" : isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)", fontSize: 14, fontWeight: 800, flexShrink: 0, border: selectedMulti.includes(opt) ? `2px solid ${accentColor}` : "2px solid transparent" }}>
                {selectedMulti.includes(opt) ? <MI name="check" size={16} color={accentColor} /> : String.fromCharCode(65 + i)}
              </span>
              {opt}
            </button>
          ))}
          {qType === "multi" && !answered && selectedMulti.length > 0 && (
            <button style={styles.nextBtn} onClick={submitMulti}>
              <MI name="check_circle" size={18} /> {lang === "el" ? "Υποβολή" : "Submit"} ({selectedMulti.length}/{correctArr.length})
            </button>
          )}

          {/* OPEN ENDED */}
          {qType === "open" && !answered && (
            <div style={{ marginTop: 8 }}>
              <input
                type="text"
                value={openAnswer}
                onChange={(e) => setOpenAnswer(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter" && openAnswer.trim()) submitOpen(); }}
                placeholder={lang === "el" ? "Γράψε εδώ..." : "Type here..."}
                style={{
                  width: "100%", padding: "14px 18px", borderRadius: 14, fontSize: 16, fontWeight: 700,
                  border: `2px solid ${isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)"}`,
                  background: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.03)",
                  color: textColor, fontFamily: "inherit", outline: "none",
                }}
                autoFocus
              />
              {openAnswer.trim() && (
                <button style={{ ...styles.nextBtn, marginTop: 10 }} onClick={submitOpen}>
                  <MI name="send" size={18} /> {lang === "el" ? "Υποβολή" : "Submit"}
                </button>
              )}
            </div>
          )}
          {qType === "open" && answered && (
            <div style={{ marginTop: 8, padding: "12px 16px", borderRadius: 12, background: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.03)", fontSize: 15, fontWeight: 700 }}>
              {lang === "el" ? "Απάντησή σου:" : "Your answer:"} {openAnswer}
            </div>
          )}

          {/* FEEDBACK (all types) */}
          {answered && (
            <>
              <div style={styles.feedback(isCorrect)}>
                <span style={{ display: "flex", alignItems: "center", gap: 6 }}><MI name={isCorrect ? "check_circle" : "cancel"} size={20} /> {isCorrect ? t.correct : t.wrong}</span>
                {!isCorrect && <span style={{ fontSize: 13, fontWeight: 600 }}>{t.theCorrectAnswer} {Array.isArray(q.a) ? q.a.join(", ") : q.a}</span>}
              </div>
              <button style={styles.nextBtn} onClick={nextQuestion}>
                {qIdx + 1 >= questions.length ? t.finish : t.next} <MI name="arrow_forward" size={18} />
              </button>
            </>
          )}
        </div>
      </div>
    );
  };

  // ─── RENDER RESULTS ───
  const renderResults = () => {
    const pct = score / questions.length;
    let stars = 0;
    if (pct >= 0.9) stars = 3;
    else if (pct >= 0.7) stars = 2;
    else if (pct >= 0.5) stars = 1;
    const msg = pct >= 0.9 ? t.excellent : pct >= 0.7 ? t.great : pct >= 0.5 ? t.good : t.tryAgain;

    return (
      <div style={{ display: "flex", justifyContent: "center" }}>
        <div style={styles.resultsCard}>
          <div style={{ marginBottom: 8 }}><MI name="emoji_events" size={48} color={skin.star} /></div>
          <div style={{ fontSize: 16, fontWeight: 700, opacity: 0.7, marginBottom: 8 }}>{t.results}</div>
          <div style={styles.bigScore}>{score}/{questions.length}</div>
          <div style={styles.resultStars}>
            {[1, 2, 3].map((i) => (
              <MI key={i} name="star" size={36} color={skin.star} style={{ opacity: i <= stars ? 1 : 0.2, transition: "opacity 0.5s", transitionDelay: `${i * 0.2}s` }} />
            ))}
          </div>
          <div style={styles.resultMsg}>{msg}</div>
          <div style={styles.btnRow}>
            <button style={styles.outlineBtn} onClick={() => setScreen(currentCat && currentCat.region === "teacher" ? "menu" : "subcategory")}>{t.backToMenu}</button>
            <button style={styles.nextBtn} onClick={() => startQuiz(currentCat)}>{t.playAgain}</button>
          </div>
        </div>
      </div>
    );
  };

  // ─── AI KEY HELPERS ───
  const getAiKeys = () => {
    try { return JSON.parse(localStorage.getItem("geo-quiz-ai-keys") || "{}"); } catch { return {}; }
  };
  const saveAiKey = (provider, key) => {
    const keys = getAiKeys();
    keys[provider] = key;
    try { localStorage.setItem("geo-quiz-ai-keys", JSON.stringify(keys)); } catch {}
  };
  const deleteAiKey = (provider) => {
    const keys = getAiKeys();
    delete keys[provider];
    try { localStorage.setItem("geo-quiz-ai-keys", JSON.stringify(keys)); } catch {}
  };
  const currentProviderKey = () => getAiKeys()[aiProvider] || "";

  // ─── RENDER SETTINGS ───
  const renderSettings = () => {
    const allKeys = getAiKeys();
    const hasCurrentKey = !!allKeys[aiProvider];
    const hasAnyKey = Object.keys(allKeys).length > 0;
    return (
    <div style={{ display: "flex", justifyContent: "center" }}>
      <div style={styles.settingsPanel}>
        {/* Header with close button */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ ...styles.settingsTitle, marginBottom: 0 }}><MI name="settings" size={22} /> {t.settings}</div>
          <button
            onClick={() => setScreen("menu")}
            style={{
              background: isDark ? "rgba(255,255,255,0.1)" : "rgba(0,0,0,0.06)",
              border: "none", borderRadius: 10, width: 36, height: 36, cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", color: textColor,
            }}
          ><MI name="close" size={20} /></button>
        </div>

        {/* Student Name */}
        <div style={styles.settingsRow}>
          <span style={styles.settingsLabel}><MI name="person" size={16} /> {t.studentName}</span>
          <input
            type="text"
            value={studentName}
            onChange={(e) => {
              setStudentName(e.target.value);
              try { localStorage.setItem("geo-quiz-student-name", e.target.value); } catch {}
            }}
            placeholder={t.studentNamePlaceholder}
            style={{
              padding: "7px 14px", borderRadius: 12, fontSize: 14, fontWeight: 600, width: 160,
              border: `2px solid ${isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)"}`,
              background: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.03)",
              color: textColor, fontFamily: "inherit", outline: "none",
            }}
          />
        </div>

        {/* Language */}
        <div style={styles.settingsRow}>
          <span style={styles.settingsLabel}><MI name="translate" size={16} /> {t.language}</span>
          <div style={styles.pillGroup}>
            {[["el", "Ελληνικά"], ["en", "English"]].map(([code, label]) => (
              <button key={code} style={styles.pill(lang === code)}
                onClick={() => { setLang(code); try { localStorage.setItem("geo-quiz-lang", code); } catch {} }}
              >{label}</button>
            ))}
          </div>
        </div>

        {/* Theme */}
        <div style={styles.settingsRow}>
          <span style={styles.settingsLabel}><MI name="palette" size={16} /> {t.theme}</span>
          <div style={styles.pillGroup}>
            {["light", "dark", "auto"].map((mode) => (
              <button key={mode} style={styles.pill(themeMode === mode)}
                onClick={() => { setThemeMode(mode); try { localStorage.setItem("geo-quiz-theme", mode); } catch {} }}
              >
                <MI name={mode === "light" ? "light_mode" : mode === "dark" ? "dark_mode" : "brightness_auto"} size={14} /> {t[mode]}
              </button>
            ))}
          </div>
        </div>

        {/* Skin */}
        <div style={styles.settingsRow}>
          <span style={styles.settingsLabel}><MI name="color_lens" size={16} /> {t.skin}</span>
          <div style={{ display: "flex", gap: 8 }}>
            {SKINS.map((s, i) => (
              <div key={i} style={styles.skinDot(i)} title={s.name}
                onClick={() => { setSkinIdx(i); try { localStorage.setItem("geo-quiz-skin", String(i)); } catch {} }}
              />
            ))}
          </div>
        </div>

        {/* Questions per round */}
        <div style={styles.settingsRow}>
          <span style={styles.settingsLabel}><MI name="quiz" size={16} /> {t.questionsPerRound}</span>
          <div style={styles.pillGroup}>
            {[10, 20, 30, 50, 100].map((n) => (
              <button key={n} style={styles.pill(questionsPerRound === n)}
                onClick={() => { setQuestionsPerRound(n); try { localStorage.setItem("geo-quiz-qpr", String(n)); } catch {} }}
              >{n}</button>
            ))}
          </div>
        </div>

        {/* AI Mode Section */}
        <div style={{ ...styles.settingsRow, flexDirection: "column", alignItems: "stretch", gap: 14, padding: "16px 0" }}>
          {/* AI toggle */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ ...styles.settingsLabel, fontSize: 15 }}><MI name="auto_awesome" size={18} color={accentColor} /> {t.aiMode}</span>
            {hasAnyKey ? (
              <button
                onClick={() => {
                  const next = !aiMode;
                  setAiMode(next);
                  if (next) { setAiApiKey(currentProviderKey()); }
                  try { localStorage.setItem("geo-quiz-ai-mode", next ? "on" : "off"); } catch {}
                }}
                style={{
                  fontSize: 13, fontWeight: 800, padding: "6px 16px", borderRadius: 20, cursor: "pointer",
                  border: `2px solid ${aiMode ? skin.correct : isDark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.1)"}`,
                  background: aiMode ? skin.correct + "22" : isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.04)",
                  color: aiMode ? skin.correct : textColor,
                  display: "flex", alignItems: "center", gap: 6, transition: "all 0.2s",
                }}
              >
                <MI name={aiMode ? "toggle_on" : "toggle_off"} size={20} /> {aiMode ? "ON" : "OFF"}
              </button>
            ) : (
              <span style={{ fontSize: 12, fontWeight: 700, padding: "4px 12px", borderRadius: 12,
                background: isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)", color: textColor }}>
                {t.aiNoKey}
              </span>
            )}
          </div>

          {/* Provider selector with key indicators */}
          <div>
            <span style={{ fontSize: 13, fontWeight: 700, opacity: 0.7 }}>{t.aiProvider}</span>
            <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
              {Object.entries(AI_PROVIDERS).map(([key, prov]) => (
                <button key={key}
                  style={{
                    ...styles.pill(aiProvider === key),
                    display: "flex", alignItems: "center", gap: 5, padding: "7px 14px", fontSize: 13,
                  }}
                  onClick={() => {
                    setAiProvider(key);
                    const savedKey = allKeys[key] || "";
                    setAiKeyInput(savedKey);
                    setAiApiKey(savedKey);
                    try { localStorage.setItem("geo-quiz-ai-provider", key); } catch {}
                  }}
                >
                  {prov.name.split(" ")[0]}
                  {allKeys[key] && <MI name="check_circle" size={14} color={skin.correct} />}
                </button>
              ))}
            </div>
          </div>

          {/* API Key input */}
          <div>
            <span style={{ fontSize: 13, fontWeight: 700, opacity: 0.7 }}>{t.aiApiKey} — {AI_PROVIDERS[aiProvider]?.name}</span>
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              <input
                type="password"
                value={aiKeyInput}
                onChange={(e) => setAiKeyInput(e.target.value)}
                placeholder={aiProvider === "anthropic" ? "sk-ant-..." : aiProvider === "openai" ? "sk-..." : "AIza..."}
                style={{
                  flex: 1, padding: "10px 14px", borderRadius: 12, fontSize: 14,
                  border: `2px solid ${isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)"}`,
                  background: isDark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.03)",
                  color: textColor, fontFamily: "monospace", outline: "none",
                }}
              />
              <button
                style={{ ...styles.pill(true), padding: "10px 18px", fontSize: 13 }}
                onClick={() => {
                  if (aiKeyInput.trim()) {
                    const k = aiKeyInput.trim();
                    setAiApiKey(k);
                    setAiMode(true);
                    setAiStatus("ok");
                    saveAiKey(aiProvider, k);
                    try {
                      localStorage.setItem("geo-quiz-ai-provider", aiProvider);
                      localStorage.setItem("geo-quiz-ai-mode", "on");
                    } catch {}
                  }
                }}
              >
                <MI name="save" size={16} /> {t.aiSave}
              </button>
              {hasCurrentKey && (
                <button
                  style={{ ...styles.pill(false), padding: "10px 12px", color: skin.wrong, border: `2px solid ${skin.wrong}40` }}
                  onClick={() => {
                    deleteAiKey(aiProvider);
                    setAiKeyInput("");
                    if (aiProvider === aiProvider) setAiApiKey("");
                    const remaining = getAiKeys();
                    if (Object.keys(remaining).length === 0) { setAiMode(false); try { localStorage.setItem("geo-quiz-ai-mode", "off"); } catch {} }
                  }}
                >
                  <MI name="delete" size={16} />
                </button>
              )}
            </div>
          </div>
        </div>

        {/* Progress / Reset */}
        <div style={{ ...styles.settingsRow, borderBottom: "none" }}>
          <span style={styles.settingsLabel}><MI name="star" size={16} color={skin.star} /> {t.totalStars}: {totalStars}</span>
          {!showReset ? (
            <button style={{ ...styles.pill(false), color: skin.wrong }} onClick={() => setShowReset(true)}>
              {t.resetProgress}
            </button>
          ) : (
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ fontSize: 12 }}>{t.confirmReset}</span>
              <button
                style={{ ...styles.pill(false), color: skin.wrong, borderColor: skin.wrong }}
                onClick={() => { saveProgress({}); setShowReset(false); }}
              >{t.yes}</button>
              <button style={styles.pill(false)} onClick={() => setShowReset(false)}>{t.no}</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
  };

  return (
    <div style={styles.app}>
      <div style={styles.header}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <GlobeLogo accent={accentColor} accentLight={accentLightColor} textColor={textColor} size={48} />
          <div>
            <div style={styles.title}>{t.appTitle}</div>
            <div style={styles.subtitle}>{t.appSubtitle} {aiMode && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, background: skin.correct + "22", color: skin.correct, padding: "1px 8px", borderRadius: 8, fontSize: 11, fontWeight: 800, marginLeft: 6, verticalAlign: "middle" }}><MI name="auto_awesome" size={12} /> AI</span>}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {screen !== "menu" && (
            <button style={styles.settingsBtn} onClick={() => {
              if (screen === "settings") setScreen("menu");
              else if (screen === "quiz" || screen === "results") {
                if (currentCat && currentCat.region === "teacher") setScreen("menu");
                else setScreen("subcategory");
              }
              else if (screen === "subcategory") setScreen("menu");
            }}>
              <MI name="arrow_back" size={18} />
            </button>
          )}
          <button style={styles.settingsBtn} onClick={() => setScreen(screen === "settings" ? "menu" : "settings")}>
            <MI name="settings" size={18} />
          </button>
        </div>
      </div>

      {screen === "menu" && renderMenu()}
      {screen === "subcategory" && renderSubcategory()}
      {screen === "quiz" && renderQuiz()}
      {screen === "results" && renderResults()}
      {screen === "settings" && renderSettings()}

      <div style={{ width: "100%", textAlign: "center", padding: "32px 0 12px", opacity: 0.35, fontSize: 11, fontWeight: 600 }}>
        Powered by Vassilis Tserkezis
      </div>
    </div>
  );
}


    // ─── WRAPPER: Load data then render ──────────────────────────────
    function AppWrapper() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('./data.json')
          .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(d => { DATA = d; setData(d); })
          .catch(e => setError(e.message));
      }, []);

      if (error) return React.createElement('div', {className:'loading'}, 'Error loading data: ' + error);
      if (!data) return React.createElement('div', {className:'loading'}, 'Φόρτωση...');
      return React.createElement(App, null);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AppWrapper, null));
  </script>
</body>
</html>
